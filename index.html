<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyBoss Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #252535;
    --accent: #00ff88;
    --accent2: #4da6ff;
    --warn: #ff6b35;
    --text: #f0f0fa;
    --sub: #b0b0cc;
    --muted: #7070a0;
    --card: #13131f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .top-bar h1 { font-size: 1.75rem; font-weight: 900; }
  .top-bar h1 span { color: var(--accent); }
  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--sub); padding: 0.45rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-family: 'Heebo', sans-serif; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .stat-label { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .stat-value { font-size: 2rem; font-weight: 900; font-family: 'IBM Plex Mono', monospace; }
  .green { color: var(--accent); } .blue { color: var(--accent2); } .warn { color: var(--warn); }

  /* Table */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 2rem; }
  .table-title { padding: 1rem 1.5rem; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
  .table-header {
    display: grid;
    grid-template-columns: 110px 1fr 130px 130px 150px;
    padding: 0.65rem 1.5rem;
    font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .token-row {
    display: grid;
    grid-template-columns: 110px 1fr 130px 130px 150px;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
    align-items: center; transition: background 0.15s;
  }
  .token-row:last-child { border-bottom: none; }
  .token-row:hover { background: rgba(255,255,255,0.03); }

  .token-code { font-family: 'IBM Plex Mono', monospace; font-size: 1.05rem; font-weight: 600; color: var(--accent); letter-spacing: 0.18em; }

  .created-date { font-size: 0.8rem; color: var(--text); font-weight: 600; }
  .created-ago  { font-size: 0.72rem; color: var(--sub); margin-top: 2px; }

  .stat-cell { display: flex; flex-direction: column; gap: 4px; }
  .stat-row-item { display: flex; align-items: center; gap: 8px; }
  .stat-period { font-size: 0.62rem; color: var(--muted); width: 34px; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; font-weight: 600; min-width: 28px; }
  .bar-track { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* Chart */
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .chart-card h2 { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.25rem; }
  .chart-wrap { height: 200px; }

  .loading { color: var(--muted); text-align: center; padding: 3rem; font-size: 0.9rem; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .fade { animation: fadeUp 0.3s ease forwards; }
  @media (max-width: 600px) {
    .col-created { display: none; }
    .table-header { grid-template-columns: 110px 130px 130px 100px !important; }
    .token-row    { grid-template-columns: 110px 130px 130px 100px !important; }
  }
</style>
</head>
<body>
<div class="top-bar">
  <h1>Money<span>Boss</span> <small style="font-size:0.85rem;color:var(--muted);font-weight:300">Admin</small></h1>
  <button class="refresh-btn" onclick="loadData()">↻ רענן</button>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">סה״כ משתמשים</div>
    <div class="stat-value green" id="statUsers">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">כניסות השבוע</div>
    <div class="stat-value blue" id="statViews">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">הוצאות השבוע</div>
    <div class="stat-value warn" id="statExpenses">—</div>
  </div>
</div>

<!-- Token table first -->
<div class="table-card fade">
  <div class="table-title">משתמשים — ממוינים לפי כניסות</div>
  <div class="table-header">
    <div>טוקן</div>
    <div class="col-created">נוצר / גיל</div>
    <div>כניסות</div>
    <div>הוצאות</div>
    <div style="padding-right:8px">כניסות לאורך זמן</div>
  </div>
  <div id="tokenTable"><div class="loading">טוען נתונים...</div></div>
</div>

<!-- Chart below -->
<div class="chart-card fade">
  <h2>פעילות 7 ימים אחרונים</h2>
  <div class="chart-wrap">
    <canvas id="activityChart"></canvas>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pyesfzaeccommpwokpaq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ebHVqMPJkDUi5fpfXPnpDQ_ZQXWhmeF';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let chartInstance = null;

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  const w = Math.floor(d / 7);
  const mo = Math.floor(d / 30);
  if (mo >= 1) return `לפני ${mo} חודש${mo > 1 ? 'ים' : ''}`;
  if (w  >= 1) return `לפני ${w} שבוע${w  > 1 ? 'ות' : ''}`;
  if (d  >= 1) return `לפני ${d} יום${d  > 1 ? 'ים' : ''}`;
  if (h  >= 1) return `לפני ${h} שעה${h  > 1 ? 'ות' : ''}`;
  return `לפני ${m} דקה${m !== 1 ? 'ות' : ''}`;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

async function loadData() {
  document.getElementById('tokenTable').innerHTML = '<div class="loading">טוען...</div>';

  const now      = new Date();
  const today    = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  const since7   = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

  const [tokensRes, analyticsAllRes] = await Promise.all([
    sb.from('user_tokens').select('token, created_at').order('created_at', { ascending: false }),
    sb.from('analytics').select('user_token, event_type, created_at').gte('created_at', since7)
  ]);

  const tokens  = tokensRes.data    || [];
  const analAll = analyticsAllRes.data || [];

  // Weekly totals for summary
  const weekViews = analAll.filter(a => a.event_type === 'page_view').length;
  const weekExp   = analAll.filter(a => a.event_type === 'add_expense').length;
  document.getElementById('statUsers').textContent    = tokens.length;
  document.getElementById('statViews').textContent    = weekViews;
  document.getElementById('statExpenses').textContent = weekExp;

  // Per-token stats
  const tokenStats = tokens.map(t => {
    const mine      = analAll.filter(a => a.user_token === t.token);
    const todayRows = mine.filter(a => a.created_at >= today);
    return {
      token:       t.token,
      created_at:  t.created_at,
      viewsToday:  todayRows.filter(a => a.event_type === 'page_view').length,
      viewsWeek:   mine.filter(a => a.event_type === 'page_view').length,
      expToday:    todayRows.filter(a => a.event_type === 'add_expense').length,
      expWeek:     mine.filter(a => a.event_type === 'add_expense').length,
    };
  });

  // Sort by weekly views desc
  tokenStats.sort((a, b) => b.viewsWeek - a.viewsWeek || b.expWeek - a.expWeek);

  const maxViews = Math.max(...tokenStats.map(t => t.viewsWeek), 1);
  const maxExp   = Math.max(...tokenStats.map(t => t.expWeek),   1);

  document.getElementById('tokenTable').innerHTML = tokenStats.map(t => {
    const vBar = Math.round((t.viewsWeek / maxViews) * 100);
    const eBar = Math.round((t.expWeek   / maxExp)   * 100);
    return `<div class="token-row">
      <div class="token-code" style="cursor:pointer" onclick="openPreview('${t.token}')" title="פתח את חשבון ${t.token}">${t.token}</div>
      <div class="col-created">
        <div class="created-date">${formatDate(t.created_at)}</div>
        <div class="created-ago">${timeAgo(t.created_at)}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-row-item">
          <span class="stat-period">היום</span>
          <span class="stat-num blue">${t.viewsToday}</span>
        </div>
        <div class="stat-row-item">
          <span class="stat-period">שבוע</span>
          <span class="stat-num blue">${t.viewsWeek}</span>
        </div>
      </div>
      <div class="stat-cell">
        <div class="stat-row-item">
          <span class="stat-period">היום</span>
          <span class="stat-num green">${t.expToday}</span>
        </div>
        <div class="stat-row-item">
          <span class="stat-period">שבוע</span>
          <span class="stat-num green">${t.expWeek}</span>
        </div>
      </div>
      <div style="padding-right:8px">
        <div class="bar-track" style="height:6px">
          <div class="bar-fill" style="width:${vBar}%;background:var(--accent2);height:100%"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Chart
  const days = [], viewsByDay = [], expByDay = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const label   = `${d.getDate()}/${d.getMonth()+1}`;
    const dateStr = d.toISOString().slice(0, 10);
    days.push(label);
    viewsByDay.push(analAll.filter(a => a.event_type === 'page_view'   && a.created_at.startsWith(dateStr)).length);
    expByDay.push  (analAll.filter(a => a.event_type === 'add_expense' && a.created_at.startsWith(dateStr)).length);
  }
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('activityChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: days,
      datasets: [
        { label: 'כניסות',  data: viewsByDay, backgroundColor: 'rgba(77,166,255,0.55)', borderRadius: 4, borderWidth: 0 },
        { label: 'הוצאות', data: expByDay,   backgroundColor: 'rgba(0,255,136,0.55)', borderRadius: 4, borderWidth: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#b0b0cc', font: { family: 'Heebo', size: 12 } } } },
      scales: {
        x: { grid: { color: '#252535' }, ticks: { color: '#b0b0cc' } },
        y: { grid: { color: '#252535' }, ticks: { color: '#b0b0cc' }, beginAtZero: true }
      }
    }
  });
}

loadData();
</script>
<!-- Preview panel -->
<div id="previewPanel" style="display:none;margin-top:2rem">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
    <div style="font-size:0.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.1em">
      תצוגה: <span id="previewLabel" style="color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:0.9rem;letter-spacing:0.18em"></span>
    </div>
    <button onclick="closePreview()" style="background:transparent;border:1px solid var(--border);color:var(--sub);padding:0.3rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:'Heebo',sans-serif;transition:all 0.2s" onmouseover="this.style.borderColor='var(--warn)';this.style.color='var(--warn)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--sub)'">✕ סגור</button>
  </div>
  <iframe id="previewFrame"
    style="width:100%;height:780px;border:1px solid var(--border);border-radius:12px;background:#0a0a0f"
    src="about:blank">
  </iframe>
</div>

<script>
function openPreview(token) {
  const panel = document.getElementById('previewPanel');
  const frame = document.getElementById('previewFrame');
  const label = document.getElementById('previewLabel');
  label.textContent = token;
  frame.src = 'https://urielshavat.github.io/MoneyBoss?token=' + token;
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function closePreview() {
  const panel = document.getElementById('previewPanel');
  const frame = document.getElementById('previewFrame');
  panel.style.display = 'none';
  frame.src = 'about:blank';
}
</script>
</body>
</html>
